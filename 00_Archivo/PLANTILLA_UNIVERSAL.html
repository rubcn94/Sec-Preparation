<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--
╔══════════════════════════════════════════════════════════════════════╗
║         PLANTILLA UNIVERSAL DE SIMULACRO — REUTILIZABLE              ║
╠══════════════════════════════════════════════════════════════════════╣
║  Para usar en cualquier temario de certificación                     ║
║                                                                      ║
║  PASOS PARA ADAPTAR:                                                  ║
║  1. Cambia <title> con el nombre de tu certificación                 ║
║  2. Ajusta DOMAIN_NAMES con los dominios de tu examen                ║
║  3. Ajusta DOMAIN_WEIGHTS con el número de preguntas por dominio     ║
║  4. Rellena el array Q[] con tus preguntas (formato abajo)           ║
║  5. Cambia el score de aprobado en PASSING_SCORE                     ║
║  6. Cambia EXAM_MINUTES para ajustar el tiempo                       ║
║                                                                      ║
║  FORMATO DE PREGUNTA:                                                 ║
║  {                                                                    ║
║    d: 1,              // Dominio (1-N)                               ║
║    s: "Escenario...", // Contexto opcional (string)                  ║
║    q: "Pregunta...",  // Texto de la pregunta                        ║
║    o: ["A","B","C","D"], // Opciones (4 opciones)                    ║
║    c: 2,              // Índice correcto (0-3)                       ║
║    e: "Explicación..." // Explicación con ✓/✗ por opción            ║
║  }                                                                    ║
║                                                                      ║
║  CARACTERÍSTICAS:                                                     ║
║  ✓ Temporizador configurable                                         ║
║  ✓ Shuffling de preguntas Y respuestas (shuffleOpts)                ║
║  ✓ Grid de navegación                                                ║
║  ✓ Resultados por dominio                                            ║
║  ✓ Modo revisión ("Solo ver correcciones")                           ║
║  ✓ Descarga MD solo con errores (lo que fallaste)                    ║
╚══════════════════════════════════════════════════════════════════════╝
-->
<title>CERTIFICACIÓN — Simulacro #N</title>

<!-- ════════════════════════════════════════════════════
     CONFIGURACIÓN — PERSONALIZAR AQUÍ
     ════════════════════════════════════════════════════ -->
<script>
// ─── CONFIGURA TU EXAMEN ──────────────────────────────────────────
const EXAM_TITLE    = 'Simulacro #N';          // Aparece en la cabecera
const EXAM_MINUTES  = 90;                       // Tiempo en minutos
const PASSING_SCORE = 750;                      // Score mínimo para aprobar (escala 100-900)
const TOTAL_Q       = 90;                       // Total de preguntas esperado

// Nombres de los dominios (empieza en índice 1)
const DOMAIN_NAMES = {
  1: 'D1 General Security Concepts',
  2: 'D2 Threats & Vulnerabilities',
  3: 'D3 Security Architecture',
  4: 'D4 Security Operations',
  5: 'D5 Program Management',
};

// Número de preguntas por dominio (para calcular porcentajes)
const DOMAIN_WEIGHTS = { 1:11, 2:20, 3:16, 4:25, 5:18 };
// ─────────────────────────────────────────────────────────────────
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#242836;--bg4:#2e3344;
  --tx:#e4e6ee;--tx2:#9ca0b0;--tx3:#686d82;
  --bd:#2e3344;--bd2:#3d4259;
  --accent:#6c8aff;--accent2:#4a6aef;--accent-bg:rgba(108,138,255,0.08);
  --green:#34d399;--green-bg:rgba(52,211,153,0.1);--green-bd:rgba(52,211,153,0.3);
  --red:#f87171;--red-bg:rgba(248,113,113,0.1);--red-bd:rgba(248,113,113,0.3);
  --amber:#fbbf24;
  --font:'IBM Plex Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--tx);line-height:1.6;min-height:100vh}
.wrap{max-width:820px;margin:0 auto;padding:16px}
.header{text-align:center;padding:24px 0 16px;border-bottom:1px solid var(--bd)}
.header h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.header .sub{font-size:13px;color:var(--tx2);margin-top:4px}
.timer-bar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--bd);padding:10px 0}
.timer-inner{max-width:820px;margin:0 auto;padding:0 16px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.timer{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--accent);min-width:80px}
.timer.warning{color:var(--amber)}.timer.critical{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.progress-text{font-size:13px;color:var(--tx2)}
.progress-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s}
.start-screen{text-align:center;padding:60px 20px}
.start-screen h2{font-size:28px;font-weight:700;margin-bottom:12px}
.start-screen p{color:var(--tx2);font-size:14px;margin-bottom:8px;max-width:500px;margin-left:auto;margin-right:auto}
.start-screen .specs{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:28px 0;max-width:480px;margin-left:auto;margin-right:auto}
.spec{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:16px 12px}
.spec-num{font-size:28px;font-weight:700;color:var(--accent)}.spec-label{font-size:12px;color:var(--tx2);margin-top:4px}
.btn-start{background:var(--accent);color:#fff;border:none;padding:14px 48px;font-size:16px;font-weight:600;border-radius:var(--radius);cursor:pointer;font-family:var(--font);margin-top:20px;transition:all 0.2s}
.btn-start:hover{background:var(--accent2);transform:translateY(-1px)}
.q-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:20px;margin:12px 0}
.q-num{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.q-domain{font-size:10px;color:var(--tx3);background:var(--bg3);padding:2px 8px;border-radius:4px;margin-left:8px}
.q-text{font-size:15px;font-weight:500;margin-bottom:16px;line-height:1.7}
.q-scenario{font-size:13px;color:var(--tx2);background:var(--bg3);border-left:3px solid var(--accent);padding:12px 14px;border-radius:0 var(--radius) var(--radius) 0;margin-bottom:14px;line-height:1.7}
.opt{display:block;padding:12px 14px;margin:6px 0;border:1px solid var(--bd);border-radius:8px;cursor:pointer;font-size:14px;transition:all 0.15s;background:var(--bg3)}
.opt:hover:not(.disabled){background:var(--bg4);border-color:var(--bd2)}
.opt.selected{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.opt.correct{background:var(--green-bg)!important;border-color:var(--green-bd)!important;color:var(--green)!important}
.opt.wrong{background:var(--red-bg)!important;border-color:var(--red-bd)!important;color:var(--red)!important}
.opt.disabled{pointer-events:none;opacity:0.6}.opt.disabled.correct{opacity:1}
.opt-letter{font-family:var(--mono);font-weight:600;margin-right:10px;font-size:12px}
.explanation{display:none;background:var(--bg3);border-radius:8px;padding:14px;margin-top:12px;font-size:13px;color:var(--tx2);line-height:1.7;border-left:3px solid var(--green)}
.explanation.show{display:block}.explanation b{color:var(--green)}
.q-nav{display:flex;justify-content:space-between;align-items:center;margin:20px 0}
.btn{padding:10px 24px;border:1px solid var(--bd);border-radius:8px;background:var(--bg2);color:var(--tx);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.15s}
.btn:hover{background:var(--bg3);border-color:var(--bd2)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-finish{background:#dc2626;border-color:#dc2626;color:#fff}.btn-finish:hover{background:#b91c1c}
.btn:disabled{opacity:0.3;pointer-events:none}
.q-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin:16px 0}
.q-dot{width:100%;aspect-ratio:1;border-radius:6px;border:1px solid var(--bd);background:var(--bg3);cursor:pointer;font-size:11px;font-family:var(--mono);display:flex;align-items:center;justify-content:center;color:var(--tx3);transition:all 0.15s}
.q-dot:hover{border-color:var(--accent)}.q-dot.current{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.q-dot.answered{background:var(--accent);border-color:var(--accent);color:#fff}
.q-dot.correct-dot{background:var(--green);border-color:var(--green);color:#fff}
.q-dot.wrong-dot{background:var(--red);border-color:var(--red);color:#fff}
.results{text-align:center;padding:32px 0}.results h2{font-size:28px;font-weight:700;margin-bottom:8px}
.results .score-big{font-size:72px;font-weight:700;margin:16px 0}
.results .score-big.pass{color:var(--green)}.results .score-big.fail{color:var(--red)}
.results .verdict{font-size:18px;font-weight:600;margin-bottom:24px}
.domain-scores{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:20px 0}
@media(max-width:600px){.domain-scores{grid-template-columns:repeat(2,1fr)}.q-grid{grid-template-columns:repeat(9,1fr)}}
.d-score{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:14px 10px;text-align:center}
.d-score-label{font-size:11px;color:var(--tx2);font-weight:500}.d-score-pct{font-size:24px;font-weight:700;margin-top:4px}
.d-score-detail{font-size:11px;color:var(--tx3);margin-top:2px}.hidden{display:none}
</style>
</head>
<body>

<div class="timer-bar hidden" id="timerBar">
  <div class="timer-inner">
    <div class="timer" id="timer">90:00</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">0 / 90</div>
  </div>
</div>

<div class="wrap">
  <div class="header">
    <h1 id="mainTitle">🔐 Simulacro #N</h1>
    <p class="sub">Examen de práctica con escenarios realistas</p>
  </div>

  <div id="startScreen" class="start-screen">
    <h2>¿Preparado?</h2>
    <p>Preguntas de escenario como el examen real, distribuidas por dominio.</p>
    <div class="specs">
      <div class="spec"><div class="spec-num" id="specQ">90</div><div class="spec-label">Preguntas</div></div>
      <div class="spec"><div class="spec-num" id="specM">90</div><div class="spec-label">Minutos</div></div>
      <div class="spec"><div class="spec-num" id="specP">750</div><div class="spec-label">Para aprobar</div></div>
    </div>
    <p id="domainDist" style="font-size:12px;color:var(--tx3)"></p>
    <button class="btn-start" onclick="startExam()">Empezar examen</button>
    <br>
    <button class="btn-start" onclick="reviewOnly()" style="background:var(--green);margin-top:10px;font-size:14px;padding:10px 36px">📖 Solo ver correcciones</button>
  </div>

  <div id="examArea" class="hidden">
    <div class="q-grid" id="qGrid"></div>
    <div id="questionContainer"></div>
    <div class="q-nav">
      <button class="btn" id="btnPrev" onclick="navQ(-1)" disabled>← Anterior</button>
      <span id="navInfo" style="font-size:12px;color:var(--tx3)"></span>
      <button class="btn btn-primary" id="btnNext" onclick="navQ(1)">Siguiente →</button>
    </div>
    <div style="text-align:center;margin:20px 0">
      <button class="btn btn-finish" onclick="finishExam()">Finalizar examen</button>
    </div>
  </div>

  <div id="resultsArea" class="hidden results"></div>

  <div id="downloadArea" class="hidden" style="text-align:center;margin:20px 0">
    <button class="btn btn-primary" onclick="generateMD()" style="background:#34d399;border-color:#34d399">
      📥 Descargar solo errores (.md)
    </button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════
// PREGUNTAS — RELLENAR ESTE ARRAY
// Formato: {d:DOMINIO, s:"ESCENARIO_OPCIONAL", q:"PREGUNTA", o:["A","B","C","D"], c:IDX_CORRECTO, e:"EXPLICACION"}
// ════════════════════════════════════════════════════════════════════
const Q = [
  // EJEMPLO — eliminar y añadir las preguntas reales
  {d:1, s:"Un administrador configura una nueva política de seguridad para la organización.", q:"¿Cuál de los siguientes controles es PREVENTIVO?", o:["Sistema de detección de intrusiones (IDS)","Cámara de videovigilancia","Firewall con reglas de bloqueo","Registro de auditoría (audit log)"], c:2, e:"✓C) El firewall con reglas de bloqueo PREVIENE el tráfico no autorizado antes de que llegue al sistema.<br><br>✗A) IDS detecta, no previene.<br>✗B) Las cámaras son controles detective/disuasorios.<br>✗D) Los logs son controles detective."},
  // ... añade aquí el resto de preguntas
];

// ════════════════════════════════════════════════════════════════════
// INICIALIZACIÓN — actualiza UI con la configuración
// ════════════════════════════════════════════════════════════════════
document.getElementById('mainTitle').textContent = '🔐 ' + EXAM_TITLE;
document.title = EXAM_TITLE;
document.getElementById('specQ').textContent = TOTAL_Q;
document.getElementById('specM').textContent = EXAM_MINUTES;
document.getElementById('specP').textContent = PASSING_SCORE;
document.getElementById('domainDist').textContent =
  Object.entries(DOMAIN_WEIGHTS).map(([d,w])=>DOMAIN_NAMES[d].split(' ').slice(0,2).join(' ')+' '+w+'q').join(' · ');

// ════════════════════════════════════════════════════════════════════
// ENGINE — no modificar
// ════════════════════════════════════════════════════════════════════
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function shuffleOpts(q){
  const idx=[0,1,2,3];
  for(let i=3;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  const c=Array.isArray(q.c)?q.c.map(ci=>idx.indexOf(ci)):idx.indexOf(q.c);
  return Object.assign({},q,{o:idx.map(i=>q.o[i]),c:c});
}

let questions=[], answers=[], current=0, timerInterval=null, timeLeft=EXAM_MINUTES*60, reviewMode=false;

function startExam(){
  questions=shuffle([...Q]).map(shuffleOpts);
  answers=new Array(questions.length).fill(null);
  reviewMode=false;
  timeLeft=EXAM_MINUTES*60;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('examArea').classList.remove('hidden');
  document.getElementById('timerBar').classList.remove('hidden');
  document.getElementById('progressText').textContent='0 / '+questions.length;
  startTimer();renderGrid();showQ(0);
}

function reviewOnly(){
  questions=[...Q].map(shuffleOpts);
  answers=questions.map(q=>Array.isArray(q.c)?q.c[0]:q.c);
  reviewMode=true;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('examArea').classList.remove('hidden');
  renderGrid();showQ(0);
}

function startTimer(){
  timerInterval=setInterval(()=>{
    timeLeft--;updateTimer();
    if(timeLeft<=0){clearInterval(timerInterval);finishExam();}
  },1000);
}

function updateTimer(){
  const m=Math.floor(timeLeft/60),s=timeLeft%60;
  const t=document.getElementById('timer');
  t.textContent=`${m}:${s.toString().padStart(2,'0')}`;
  t.className='timer'+(timeLeft<300?' critical':timeLeft<600?' warning':'');
}

function renderGrid(){
  const g=document.getElementById('qGrid');g.innerHTML='';
  questions.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='q-dot'+(i===current?' current':'')+(answers[i]!==null?' answered':'');
    d.textContent=i+1;d.onclick=()=>showQ(i);g.appendChild(d);
  });
}

function showQ(i){
  current=i;
  const q=questions[i];
  const letters=['A','B','C','D'];
  let html=`<div class="q-card"><div class="q-num">Pregunta ${i+1} <span class="q-domain">D${q.d}</span></div>`;
  if(q.s)html+=`<div class="q-scenario">${q.s}</div>`;
  html+=`<div class="q-text">${q.q}</div>`;
  q.o.forEach((opt,j)=>{
    let cls='opt';
    if(reviewMode||answers[i]!==null){
      if(Array.isArray(q.c)?q.c.includes(j):j===q.c)cls+=' correct disabled';
      else if(j===answers[i])cls+=' wrong disabled';
      else cls+=' disabled';
    }else if(j===answers[i])cls+=' selected';
    html+=`<div class="${cls}" onclick="selectOpt(${i},${j})"><span class="opt-letter">${letters[j]})</span>${opt}</div>`;
  });
  if(q.e&&(reviewMode||answers[i]!==null))html+=`<div class="explanation show">${q.e}</div>`;
  html+='</div>';
  document.getElementById('questionContainer').innerHTML=html;
  document.getElementById('btnPrev').disabled=i===0;
  document.getElementById('btnNext').disabled=i===questions.length-1;
  document.getElementById('navInfo').textContent=`${i+1} / ${questions.length}`;
  const filled=answers.filter(a=>a!==null).length;
  document.getElementById('progressFill').style.width=(filled/questions.length*100)+'%';
  document.getElementById('progressText').textContent=filled+' / '+questions.length;
  const dots=document.getElementById('qGrid').children;
  for(let k=0;k<dots.length;k++){
    dots[k].className='q-dot'+(k===i?' current':'')+(answers[k]!==null?' answered':'');
  }
  if(reviewMode){
    const c=Array.isArray(q.c)?q.c[0]:q.c;
    dots[i].className='q-dot '+(answers[i]===c?'correct-dot':'wrong-dot');
  }
}

function selectOpt(qi,j){if(reviewMode)return;answers[qi]=j;showQ(qi);}
function navQ(dir){showQ(current+dir);}

function finishExam(){
  if(timerInterval)clearInterval(timerInterval);
  document.getElementById('timerBar').classList.add('hidden');
  document.getElementById('examArea').classList.add('hidden');
  document.getElementById('downloadArea').classList.remove('hidden');
  const domainIds=Object.keys(DOMAIN_NAMES).map(Number);
  const dStats={};
  domainIds.forEach(d=>dStats[d]={c:0,t:0});
  let total=0,correct=0;
  questions.forEach((q,i)=>{
    dStats[q.d].t++;
    const isCorrect=Array.isArray(q.c)?q.c.includes(answers[i]):answers[i]===q.c;
    if(isCorrect){dStats[q.d].c++;correct++;}
    total++;
  });
  const pct=Math.round(correct/total*100);
  const scaled=Math.round(100+(pct/100)*800);
  const pass=scaled>=PASSING_SCORE;
  const ra=document.getElementById('resultsArea');
  ra.classList.remove('hidden');
  let dhtml='';
  domainIds.forEach(d=>{
    const p=dStats[d].t>0?Math.round(dStats[d].c/dStats[d].t*100):0;
    const col=p>=75?'var(--green)':p>=60?'var(--amber)':'var(--red)';
    const label=DOMAIN_NAMES[d].split(' ').slice(0,2).join(' ');
    dhtml+=`<div class="d-score"><div class="d-score-label">${label}</div><div class="d-score-pct" style="color:${col}">${p}%</div><div class="d-score-detail">${dStats[d].c}/${dStats[d].t}</div></div>`;
  });
  ra.innerHTML=`<h2>Resultado</h2><div class="score-big ${pass?'pass':'fail'}">${pct}%</div><div class="verdict">${pass?'✅ APROBADO':'❌ SUSPENSO'} · Escala: ${scaled}/${PASSING_SCORE+150}</div><div class="domain-scores">${dhtml}</div><button class="btn btn-primary" onclick="reviewResults()" style="margin-top:16px">📝 Revisar respuestas</button>`;
}

function reviewResults(){
  reviewMode=true;
  questions.forEach((q,i)=>{if(answers[i]===null)answers[i]=-1;});
  document.getElementById('resultsArea').classList.add('hidden');
  document.getElementById('examArea').classList.remove('hidden');
  const dots=document.getElementById('qGrid').children;
  questions.forEach((q,i)=>{
    const c=Array.isArray(q.c)?q.c[0]:q.c;
    dots[i].className='q-dot '+(answers[i]===c?'correct-dot':'wrong-dot');
  });
  showQ(0);
}

// ════════════════════════════════════════════════════════════════════
// GENERATE MD — SOLO ERRORES
// ════════════════════════════════════════════════════════════════════
function generateMD() {
    if(!questions||!questions.length){alert('Completa el examen primero.');return;}
    const dNames=DOMAIN_NAMES;
    const letters='ABCD';
    const fecha=new Date().toLocaleDateString('es-ES');

    const errores=[];
    questions.forEach((q,i)=>{
        const ua=answers[i];
        const ok=Array.isArray(q.c)?q.c.includes(ua):ua===q.c;
        if(!ok) errores.push({q,i,ua,ca:Array.isArray(q.c)?q.c[0]:q.c});
    });

    if(!errores.length){alert('Sin errores — excelente, no hay nada que descargar.');return;}

    const total=questions.length;
    const score=Math.round((total-errores.length)/total*100);
    const dErr={};
    errores.forEach(({q})=>{dErr[q.d]=(dErr[q.d]||0)+1;});
    const titulo=EXAM_TITLE;
    const tituloFile=titulo.replace(/[\s—]+/g,'_');

    let md='# ❌ Errores — '+titulo+'\n\n';
    md+='**Fecha:** '+fecha+'  \n';
    md+='**Score:** '+score+'% ('+(total-errores.length)+'/'+total+' correctas)  \n';
    md+='**Errores:** '+errores.length+' de '+total+'\n\n';
    md+='## Resumen por Dominio\n';
    Object.entries(dErr).sort(([a],[b])=>Number(a)-Number(b)).forEach(([d,n])=>{
        const tot=questions.filter(q=>q.d==d).length;
        md+='- '+dNames[d]+': **'+n+'** error'+(n>1?'es':'')+' de '+tot+'\n';
    });
    md+='\n---\n\n';

    errores.forEach(({q,i,ua,ca})=>{
        md+='## ❌ P'+(i+1)+' · D'+q.d+' — '+(dNames[q.d]||'D'+q.d)+'\n\n';
        if(q.s) md+='> 📋 '+q.s+'\n\n';
        md+='**'+q.q+'**\n\n';
        q.o.forEach((opt,j)=>{
            let mark='  ';
            if(j===ca) mark='✓';
            else if(j===ua) mark='✗';
            md+=mark+' **'+letters[j]+')** '+opt+'\n\n';
        });
        if(ua!==null&&ua!==undefined&&ua>=0) md+='> ⚠️ Respondiste: **'+letters[ua]+')** '+q.o[ua]+'\n\n';
        md+='> ✅ Correcta: **'+letters[ca]+')** '+q.o[ca]+'\n\n';
        if(q.e) md+='**💡 Explicación:**\n\n'+q.e.replace(/<br>/g,'\n').replace(/<[^>]+>/g,'')+'\n\n';
        md+='---\n\n';
    });

    const blob=new Blob([md],{type:'text/markdown'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=tituloFile+'_Errores.md';
    a.click();
    URL.revokeObjectURL(url);
}
</script>
</body>
</html>
